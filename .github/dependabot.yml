version: 2
updates:
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    groups:
      laravel:
        patterns:
          - "laravel/framework"
          - "laravel/octane"
          - "laravel/tinker"
          - "laravel/pail"
          - "laravel/sail"
          - "illuminate/*"
          - "symfony/*"
        update-types:
          - "minor"
          - "patch"
      filament:
        patterns:
          - "filament/*"
          - "danharrin/*"
        update-types:
          - "minor"
          - "patch"
      composer-dev:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      composer-other:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "laravel/framework"
        update-types: ["version-update:semver-major"]
      - dependency-name: "filament/filament"
        update-types: ["version-update:semver-major"]
      - dependency-name: "php"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    groups:
      npm-dev:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      npm-other:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
